name: FPC CI

on:
  push:
    branches: [ main, feat/tests/if-parser, feat/syntax/aurum-grammar ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreePascal
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc

      - name: Show FPC version
        run: fpc -v

      - name: Build aurumc compiler
        run: |
          set -e
          mkdir -p lib
          fpc -O2 -Mobjfpc -Sh -FUlib/ -Fuutil/ -Fufrontend/ -Fuir/ -Fubackend/ -Fubackend/x86_64/ -Fubackend/elf/ -Fubackend/pe/ -Fubackend/arm64/ lyxc.lpr -olyxc

      - name: Run tests
        run: |
          set -e
          make test

      - name: Run syntax tests
        run: |
          set -e
          make syntax-test

      - name: Run example integration tests (e2e)
        run: |
          set -e
          make e2e
